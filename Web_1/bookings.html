<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої бронювання — TicketNow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">Ticket<span>Now</span></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Події</a></li>
                <li><a href="bookings.html" class="active">Мої бронювання</a></li>
                <li><a href="about.html">Про нас</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>Ваші заброньовані квитки</h2>
        <section class="bookings-list">
            <article class="booking-item">
                <div class="booking-info">
                    <h3>IT Arena 2026</h3>
                    <p>Статус: <span class="status-confirmed">Оплачено</span></p>
                </div>
                <button class="btn-secondary">Завантажити PDF</button>
            </article>
            <article class="booking-item">
                <div class="booking-info">
                    <h3>Концерт "Океан Ельзи"</h3>
                    <p>Статус: <span class="status-pending">Очікує оплати</span></p>
                </div>
                <button class="btn-secondary">Оплатити</button>
            </article>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>Адреса офісу: м. Львів, вул. Степана Бандери, 12</p>
        </div>
    </footer>
</body>
</html>
